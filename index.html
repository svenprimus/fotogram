<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Fotogram</title>

        <link rel="icon" type="image/x-icon" href="./asset/icon/favicon.svg" />
        <link rel="stylesheet" href="./style/fonts.css" />
        <link rel="stylesheet" href="./style/variables.css" />
        <link rel="stylesheet" href="./style/standard.css" />

        <link rel="stylesheet" href="style.css" />

        <script src="./script/database.js"></script>
        <script src="./script/templates.js"></script>
        <script src="./script.js" defer></script>
    </head>
    <body onload="renderGallery()">
        <header class="header-main">
            <nav>
                <a id="home" aria-label="go to top of page" href="#page-top"
                    ><img src="./asset/icon/logo-fotogram-text.svg" alt="logo of fotogram website"
                /></a>
            </nav>
        </header>

        <main>
            <section aria-hidden="true" id="page-top"></section>
            <section>
                <h1>Special moments of my life</h1>
                <div class="gallery" id="gallery"></div>
            </section>
            <dialog id="pictureDialog" onclick="closeDialog()" aria-labelledby="dialogTitle"></dialog>
        </main>

        <section aria-hidden="true" class="filler"></section>

        <footer>
            <div>
                <img src="./asset/icon/logo-da-text.svg" alt="logo of developer akademie" />
                <p>© 2023 Developer Akademie GmbH</p>
                <div class="footer-circle"></div>
            </div>
        </footer>
    </body>
</html>

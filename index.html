<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Fotogram</title>

        <link rel="icon" type="image/x-icon" href="./assets/icon/favicon.png" />
        <link rel="stylesheet" href="./style/fonts.css" />
        <link rel="stylesheet" href="./style/variables.css" />
        <link rel="stylesheet" href="./style/standard.css" />

        <link rel="stylesheet" href="style.css" />

        <script src="./script.js" defer></script>
    </head>
    <body onload="renderGallery()">
        <header>
            <nav>
                <a role="navigation" href="#page-top"
                    ><img role="banner" src="./assets/icon/logo-fotogram-text.svg" alt="logo of fotogram website"
                /></a>
            </nav>
        </header>

        <main>
            <section aria-hidden="true" id="page-top"></section>
            <section>
                <h1>Your personal photo album</h1>
                <div role="main" class="gallery" id="gallery"></div>
            </section>
        </main>

        <section aria-hidden="true" class="filler"></section>

        <footer>
            <article role="contentinfo">
                <img src="./assets/icon/logo-da-text.svg" alt="logo of developer akademie" />
                <p>© 2023 Developer Akademie GmbH</p>
                <div class="footer-circle"></div>
            </article>
        </footer>
    </body>
</html>
